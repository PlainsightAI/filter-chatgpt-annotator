services:
  video_in:
    image: containers.openfilter.io/plainsightai/openfilter-video-in:latest
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      FILTER_ID: VideoIn
      FILTER_SOURCES: file:///video.mp4!sync!loop
      FILTER_OUTPUTS: tcp://*
    volumes:
      - ./data/sample-video.mp4:/video.mp4

  chattag_filter:
    image: containers.openfilter.io/plainsightai/openfilter-chattag:latest
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      FILTER_ID: ChatTagFilter
      FILTER_SOURCES: tcp://video_in
      FILTER_OUTPUTS: tcp://*
      FILTER_MQ_LOG: pretty
      FILTER_CHATTAG_MODEL: 'openai:gpt-4o-mini'
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FILTER_PROMPT: '/simple_salad_prompt.txt'
      FILTER_OUTPUT_SCHEMA: '{"avocado":{"present":false,"confidence":0.0},"lettuce":{"present":false,"confidence":0.0},"tomato":{"present":false,"confidence":0.0}}'
    volumes:
      - ./prompts/simple_salad_prompt.txt:/simple_salad_prompt.txt

  webvis:
    image: containers.openfilter.io/plainsightai/openfilter-webvis:latest
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      FILTER_ID: Webvis
      FILTER_SOURCES: tcp://chattag_filter
    ports:
      - 8001:8000
